services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: cable_intelligence
      POSTGRES_USER: cable
      POSTGRES_PASSWORD: cable
    ports:
      - "5432:5432"
    volumes:
      - cable_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cable -d cable_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cable_postgres_data:
